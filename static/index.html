<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SIGNAL.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>

  <!-- ── Topbar ── -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">SIGNAL<span class="accent">.</span>AI</span>
      <span class="brand-sub">STOCK INTELLIGENCE</span>
    </div>
    <div class="topbar-center">
      <div class="live-badge"><span class="live-dot"></span>LIVE</div>
      <span id="clockLabel" class="clock"></span>
    </div>
    <div class="topbar-right">
      <span id="summaryBull" class="summary bull">▲ — 看涨</span>
      <span id="summaryBear" class="summary bear">▼ — 看跌</span>
      <button id="sidebarToggle" class="sidebar-btn">★ 自选股</button>
    </div>
  </header>

  <!-- ── Layout ── -->
  <div class="layout">

    <!-- Main -->
    <div class="main-panel">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="bull">▲ 看涨</button>
        <button class="filter-btn" data-filter="bear">▼ 看跌</button>
        <button class="filter-btn" data-filter="watch">★ 自选</button>
        <div class="market-group">
          <button class="market-btn active" data-market="">全市场</button>
          <button class="market-btn" data-market="CN">A股</button>
          <button class="market-btn" data-market="US">美股</button>
        </div>
      </div>
      <div class="card-grid" id="cardGrid">
        <div class="loading-msg">正在加载今日预测数据…</div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-head">
          <span class="sidebar-title">自选股</span>
          <span class="sidebar-sub">输入代码加入关注</span>
        </div>
        <div class="watch-row">
          <input id="watchInput" placeholder="600519 / NVDA" maxlength="12" autocomplete="off"/>
          <button id="watchAdd">+</button>
        </div>
        <div id="watchMsg" class="watch-msg"></div>
        <div id="watchItems" class="watch-items"></div>
        <div class="sidebar-foot">
          <div class="foot-label">// 支持的市场</div>
          <div class="foot-item"><span style="color:var(--bull)">A股</span> — 6位数字</div>
          <div class="foot-item"><span style="color:var(--blue)">美股</span> — Ticker</div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Modal ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
